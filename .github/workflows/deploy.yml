name: Deploy Python App to Azure

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v3

    - name: Login to Azure
      uses: azure/login@v1
      with:
        creds: ${{ secrets.AZURE_CREDENTIALS }}

    - name: Build and Push Docker Image
      run: |
        az acr login --name myacrregistry
        docker build -t myacrregistry.azurecr.io/python-app:latest .
        docker push myacrregistry.azurecr.io/python-app:latest

    - name: Deploy to Azure Web App
      run: |
        az webapp config container set --name python-app-service \
          --resource-group python-app-rg \
          --docker-custom-image-name myacrregistry.azurecr.io/python-app:latest \
          --docker-registry-server-url https://myacrregistry.azurecr.io